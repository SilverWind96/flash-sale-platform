spring:
  application:
    name: flash-sale-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/flash_sale
    username: flash_sale
    password: flash_sale
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

flashsale:
  logging:
    requests:
      enabled: true

logging:
  level:
    com.flashsale: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
